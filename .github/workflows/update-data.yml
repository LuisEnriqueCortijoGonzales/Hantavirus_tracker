name: Update Hantavirus Data (fallback)

# La Raspberry Pi es la fuente principal. Este workflow solo corre
# manualmente como respaldo si la Pi está caída.
on:
  # schedule:
  #   - cron: '0 * * * *'    # ← deshabilitado: la Pi se encarga
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run fallback data update script
        run: node scripts/update_data.js

      - name: Check for changes (new or modified)
        id: diff
        run: |
          git add project/data/live.json
          git diff --cached --quiet project/data/live.json \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  'HantaTracker Bot (fallback)'
          git config user.email 'hantabot@noreply.github.com'
          git commit -m "data: fallback-update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
